name: Auto Update News

on:
  schedule:
    - cron: "0 0 * * *"   
  workflow_dispatch:         

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: 📦 Install dependencies
        run: npm install

      - name: ⚙️ Run script
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
            node fetch-news.js
            node fetch-reddit.js
            node combine.js
            node generate.js

      - name: 💾 Commit updated news.json
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add news.json
          git commit -m "🤖 auto update news" || echo "No changes"
          git push